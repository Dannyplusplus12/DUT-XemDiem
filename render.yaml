services:
  - type: web
    name: dut-exam-portal
    runtime: python
    runtimeVersion: "3.11"
    buildCommand: "cd backend && pip install --upgrade pip && pip install -r requirements.txt && pip install gunicorn"
    startCommand: "cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT app.main:app"
    preDeployCommand: "cd backend && python -c \"from app.database import init_db; init_db()\""
    envVars:
      - key: DATABASE_URL
        value: "sqlite:///./backend/contest.db"
      - key: FLASK_ENV
        value: "production"
      - key: FLASK_APP
        value: "app.main:app"
      - key: PYTHONUNBUFFERED
        value: "1"
    staticPublishPath: ""
